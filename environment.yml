name: matds
channels:
  - conda-forge
  - pytorch
  - defaults

dependencies:
  # ── Python ────────────────────────────────────────────────────────────────
  - python=3.10

  # ── Core scientific stack ─────────────────────────────────────────────────
  - numpy>=1.24,<2.0
  - pandas>=2.0
  - scipy>=1.11
  - matplotlib>=3.7
  - seaborn>=0.13

  # ── Jupyter ───────────────────────────────────────────────────────────────
  # notebook pinned to 6.x to avoid notebook.base / notebook.extensions errors
  - jupyterlab>=4.0
  - notebook>=6.5,<7.0
  - ipykernel>=6.25
  - ipywidgets>=8.0
  # jupyter_contrib_nbextensions removed — incompatible with notebook>=7

  # ── Machine learning ──────────────────────────────────────────────────────
  - scikit-learn>=1.3
  - xgboost>=2.0
  - shap>=0.43

  # ── Dimensionality reduction & clustering ─────────────────────────────────
  - umap-learn>=0.5
  - hdbscan>=0.8

  # ── Deep learning (CPU-only; students with GPU see SETUP_NOTES.md) ────────
  - pytorch::pytorch=2.1.*
  - pytorch::cpuonly

  # ── Utilities ─────────────────────────────────────────────────────────────
  - tqdm>=4.66
  - joblib>=1.3
  - requests>=2.31
  - python-dotenv>=1.0
  - pyyaml>=6.0
  - tabulate>=0.9

  # ── pip-only packages ─────────────────────────────────────────────────────
  - pip
  - pip:
    # Materials science stack — fully pinned for Python 3.10 compatibility
    # These versions are tested to work together without import errors
    - pymatgen==2024.2.8
    - emmet-core==0.83.6
    - mp-api==0.41.2
    - matminer==0.9.2
    - phonopy>=2.20          # required by matminer featurizers
    # crystal-toolkit removed — incompatible with Python 3.10

    # NLP / literature mining (Week 9)
    - transformers>=4.35
    - datasets>=2.14

    # Plotting extras
    - plotly>=5.17
    - kaleido>=0.2.1

    # Notebook utilities
    - watermark>=2.4
    - black[jupyter]>=23.0
