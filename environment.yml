name: matds
channels:
  - conda-forge
  - defaults

dependencies:
  # ── Python ────────────────────────────────────────────────────────────────
  - python=3.10

  # ── Core scientific stack (conda-forge for best compatibility) ────────────
  - numpy>=1.24,<2.0
  - pandas>=2.0
  - scipy>=1.11
  - matplotlib>=3.7
  - seaborn>=0.13

  # ── Jupyter ───────────────────────────────────────────────────────────────
  - jupyterlab>=4.0          # Use JupyterLab (not classic Notebook)
  - ipykernel>=6.25
  - ipywidgets>=8.0
  - jupyter_contrib_nbextensions

  # ── Machine learning ──────────────────────────────────────────────────────
  - scikit-learn>=1.3
  - xgboost>=2.0
  - shap>=0.43              # Feature importance / SHAP values

  # ── Dimensionality reduction & clustering ─────────────────────────────────
  - umap-learn>=0.5
  - hdbscan>=0.8

  # ── Deep learning (CPU-only by default; GPU students see notes below) ──────
  - pytorch::pytorch=2.1.*
  - pytorch::cpuonly          # Remove this line if using GPU

  # ── Utilities ─────────────────────────────────────────────────────────────
  - tqdm>=4.66
  - joblib>=1.3
  - requests>=2.31
  - python-dotenv>=1.0       # For loading MP_API_KEY from .env file
  - pyyaml>=6.0
  - tabulate>=0.9

  # ── pip-only packages (install after conda) ───────────────────────────────
  - pip
  - pip:
    # Materials science stack
    # IMPORTANT: these versions are pinned to avoid known compatibility issues
    # between matminer, pymatgen, and mp-api (see SETUP_NOTES.md)
    - pymatgen>=2024.1.1
    - mp-api>=0.41.0          # Use mp_api.client.MPRester (new API)
    - matminer>=0.9.2         # Do NOT use matminer's MPDataRetrieval;
                              # use mp-api directly (see notebooks)
    - crystal-toolkit>=2023.11.3   # Crystal structure visualization in JupyterLab

    # Graph neural networks (Week 12)
    # Install AFTER base env is working — requires matching PyTorch version
    # torch-geometric and related packages installed separately (see SETUP_NOTES.md)

    # NLP / literature mining (Week 10)
    - transformers>=4.35
    - datasets>=2.14

    # Plotting extras
    - plotly>=5.17
    - kaleido>=0.2.1          # Static plotly image export

    # Notebook quality of life
    - black[jupyter]>=23.0    # Code formatting in notebooks
    - watermark>=2.4          # Log package versions in notebooks
