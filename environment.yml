name: matds
channels:
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python=3.10
  
  # Numerical & Data Analysis
  - numpy>=1.21
  - pandas>=1.3
  - scipy>=1.7
  - scikit-learn>=1.0
  
  # Visualization
  - matplotlib>=3.4
  - seaborn>=0.11
  
  # Jupyter & Notebooks
  - jupyter>=1.0
  - jupyterlab>=3.0
  - ipython>=7.0
  - ipywidgets>=7.6
  
  # Materials Science — Core
  - pymatgen>=2022.12
  
  # File & Environment Management
  - pip>=21.0
  
  # pip packages (not available on conda-forge)
  - pip
  - pip:
    # Materials Data APIs
    - mp-api>=0.33
    - jarvis-tools>=2022.12
    
    # Configuration & Environment
    - python-dotenv>=0.19
    
    # Optional: Advanced visualization
    - plotly>=5.0
